<div class="generer-eml-container">

  <!-- HEADER MODERNE -->
  <div class="eml-hero">
    <div class="hero-icon">
      <i class="fas fa-envelope-open-text"></i>
    </div>

    <div class="hero-text">
      <h2>Génération des Bulletins</h2>
      <p>Création automatique des brouillons EML avec pièces jointes PDF</p>
    </div>

    <div class="hero-badge">
      <span>Workflow automatisé</span>
    </div>
  </div>

  <!-- CARTE -->
  <div class="card eml-card">

    <form [formGroup]="emlForm" (ngSubmit)="onSubmit()" class="eml-form">

      <!-- GRID -->
      <div class="eml-grid">

        <!-- MODELE -->
        <div class="eml-field">
          <label>Modèle PDF</label>
          <select class="field-select" formControlName="modeleId">
            <option [ngValue]="null">Sélectionner un modèle</option>
            <option *ngFor="let modele of modeles" [ngValue]="modele.id">
              {{ modele.libelle }}
            </option>
          </select>
        </div>

        <!-- EMAIL -->
        <div class="eml-field">
          <label>Email expéditeur</label>
          <input type="email" class="input" formControlName="emailExpediteur">
        </div>

        <!-- DEPARTEMENT -->
        <div class="eml-field">
          <label>Département</label>
          <select class="field-select" formControlName="departement">
            <option [ngValue]="null">Tous</option>
            <option *ngFor="let dept of departements" [ngValue]="dept.nom">
              {{ dept.nom }}
            </option>
          </select>
        </div>

        <!-- SERVICE -->
        <div class="eml-field">
          <label>Service</label>
          <select class="field-select" formControlName="service">
            <option [ngValue]="null">Tous</option>
            <option *ngFor="let serv of services" [ngValue]="serv.nom">
              {{ serv.nom }}
            </option>
          </select>
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="eml-actions">

        <button class="btn primary" type="submit" [disabled]="isLoading">
          <i class="fas" [ngClass]="isLoading ? 'fa-spinner fa-spin' : 'fa-magic'"></i>
          Générer
        </button>

        <button class="btn outline" type="button" (click)="onPreview()">
          <i class="fas fa-eye"></i>
          Aperçu
        </button>

        <button class="btn success" type="button" (click)="envoyerTousLesBrouillons()">
          <i class="fas fa-paper-plane"></i>
          Envoyer
        </button>

      </div>

    </form>
  </div>

</div>
