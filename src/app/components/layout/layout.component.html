<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 17H7A5 5 0 017 7h2M15 7h2a5 5 0 010 10h-2M8 12h8"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">BulletinRH</span>
        <span class="logo-sub">Système de paie</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>

      <a class="nav-item" routerLink="/app/upload" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        Tableau de bord
      </a>

      <a class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Bulletins
      </a>

      <a class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        Employés
        <span class="nav-badge">248</span>
      </a>

      <span class="nav-section-label">Configuration</span>

      <a class="nav-item" routerLink="/app/modele" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        Modèles
      </a>

      <a class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/>
        </svg>
        Paramètres
      </a>
    </nav>

    <div class="sidebar-footer">
  <div class="sidebar-user">

    <!-- Avatar avec initiales dynamiques -->
    <div class="user-avatar">{{ userInitials }}</div>

    <div class="user-info">
      <!-- Nom de l'utilisateur connecté -->
      <span class="user-name">{{ username }}</span>

      <!-- Statut toujours actif (static) -->
      <span class="user-role">
        <span class="user-status-dot"></span>
        Actif
      </span>
    </div>

  </div>
</div>
  </aside>

  <!-- CONTENU DYNAMIQUE -->
  <main class="main">
    <router-outlet></router-outlet>
  </main>

</div>
