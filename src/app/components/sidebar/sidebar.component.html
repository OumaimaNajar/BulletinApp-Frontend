<!-- src/app/components/sidebar/sidebar.component.html -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 17H7A5 5 0 017 7h2M15 7h2a5 5 0 010 10h-2M8 12h8"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="logo-name">BulletinRH</span>
      <span class="logo-sub">Système de paie</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <span class="nav-section-label">Principal</span>

    <!-- Configuration Emails - Upload des fichiers -->
    <a class="nav-item" routerLink="/app/upload" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="12" x2="12" y2="16"/>
        <line x1="10" y1="14" x2="14" y2="14"/>
      </svg>
      Configuration Emails
      <span class="nav-badge">Upload</span>
    </a>

    <!-- Paramètres expéditeur -->
    <a class="nav-item" routerLink="/app/configuration" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Expéditeur
      <span class="nav-badge">Configuration</span>
    </a>

    <!-- Modèles PDF -->
    <a class="nav-item" routerLink="/app/modele" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        <path d="M12 12v9"/>
      </svg>
      Modèles
      <span class="nav-badge">PDF</span>
    </a>

    <!-- Envoi Email - Génération brouillons -->
    <a class="nav-item" routerLink="/app/generer-eml" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="22,8 12,14 2,8"/>
        <line x1="16" y1="9" x2="22" y2="6"/>
        <line x1="8" y1="9" x2="2" y2="6"/>
      </svg>
      Envoi Email
      <span class="nav-badge">Brouillons</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar">{{ userInitials }}</div>
      <div class="user-info">
        <span class="user-name">{{ username }}</span>
        <span class="user-role">Super Admin</span>
      </div>
      <div class="user-status-dot"></div>
    </div>
  </div>
</aside>
